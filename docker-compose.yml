services:
  postgres:
    image: postgres:16-alpine
    container_name: futskol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: futskol
      POSTGRES_USER: futskol
      POSTGRES_PASSWORD: futskol
    ports:
      - "5432:5432"
    volumes:
      - futskol_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futskol -d futskol"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  futskol_pgdata:

server:
  port: 8080

spring:
  application:
    name: futskol-admin

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/futskol}
    username: ${DATABASE_USERNAME:futskol}
    password: ${DATABASE_PASSWORD:futskol}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: America/Sao_Paulo
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-please-use-a-very-long-random-secret-key-with-at-least-256-bits}
      expiration-ms: 86400000   # 24h
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    org.hibernate.SQL: INFO
    org.springframework.security: INFO
